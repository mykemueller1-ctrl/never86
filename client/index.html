    <!-- Structured Data: SoftwareApplication -->

      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Never 86'd",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Gamified restaurant workforce platform replacing 7shifts, HotSchedules, and spreadsheets with role-aware dashboards, real-time checklists, and shift priority leaderboards.",

        "PIN-based staff login by department",

    <!-- Structured Data: FAQ (AEO - Answer Engine Optimization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Never 86'd?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Never 86'd is a people-first restaurant workforce platform that replaces spreadsheets, group texts, and clunky scheduling apps with a gamified, role-aware system. Staff log in with a PIN, see their personalized checklists, earn points for completing tasks and giving feedback, and climb a leaderboard that determines shift priority. Managers get a command center with real-time sales, voids, payouts, and Wi-Fi proximity tracking."
          }
        },
        {
          "@type": "Question",
          "name": "How is Never 86'd different from 7shifts or HotSchedules?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unlike 7shifts and HotSchedules which focus primarily on scheduling, Never 86'd is a complete people platform. It gamifies the entire shift experience — from opening checklists to closing tasks, from issue reporting to peer feedback. Staff earn points and build streaks that translate to shift priority (better scores = first pick on preferred shifts). It also protects financial data with role-based permissions, so line cooks see gamified metrics while managers see real dollar amounts."
          }
        },
        {
          "@type": "Question",
          "name": "What does 86'd mean in restaurant terminology?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In restaurant slang, '86'd' means an item is out of stock or unavailable. When a kitchen runs out of brisket, they '86 the brisket.' Never 86'd alerts all staff in real-time when items are 86'd, so servers don't promise dishes the kitchen can't make. The platform name 'Never 86'd' represents the goal of never running out — of stock, of staff, or of momentum."
          }
        },
        {
          "@type": "Question",
          "name": "How does the gamified leaderboard work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every staff member earns points through completing checklists, submitting shift feedback, maintaining attendance streaks, and contributing to team goals. Points accumulate into a total score that determines their rank on the leaderboard. Higher scores mean higher shift priority — top performers get first pick on preferred shifts. This creates a positive feedback loop where doing good work directly rewards you with better schedules."
          }
        },
        {
          "@type": "Question",
          "name": "What types of restaurants can use Never 86'd?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Never 86'd works for any restaurant operation — bars, pizza shops, full-service restaurants, fast casual, QSR (quick service restaurants), and catering operations. The platform adapts to different department structures (bar, kitchen, server, driver, management) and role types (owner, manager, key employee, line cook, bartender, server, driver). It was built at Community Tap & Pizza in Fort Dodge, Iowa, and designed to scale from single-unit operators to multi-location groups."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Never 86'd cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Never 86'd is currently in active beta testing. The platform is being developed with a people-first philosophy — pricing will be designed to be accessible for independent restaurants, not just enterprise chains. Contact the team for early access and beta pricing."
          }
        }
      ]
    }
    </script>
